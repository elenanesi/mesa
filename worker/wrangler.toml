# Mesa couple-sync worker (Phase 2, task S1).
# Local verification: `npx --yes wrangler@latest dev --local --port 8787` (miniflare, no
# Cloudflare auth needed). Real deploy is task S2 — blocked on the mesa-deploy API token
# needing Workers Scripts:Edit + Workers KV Storage:Edit (see README.md / PHASE2-plan.md).

name = "mesa-sync"
main = "sync.js"
compatibility_date = "2026-07-13"

kv_namespaces = [
  { binding = "MESA_KV", id = "2f868b0b17374dffaef6798410c0ab38" }
]

[[d1_databases]]
binding = "MESA_DB"
database_name = "mesa-library"
database_id = "660c50ce-13b5-433f-a00b-68349ac5e851"
